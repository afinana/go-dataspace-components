name: Build and Publish Docker Images

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    name: Build & Push Service Images
    runs-on: ubuntu-latest
    env:
      REGISTRY_USER: ${{ secrets.DOCKER_USERNAME || 'local' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-hub
          - control-plane
          - data-plane
          - catalog
          - data-dashboard
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata (Tags, Labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.REGISTRY_USER }}/go-dataspace-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and Push Service Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/${{ matrix.service }}.Dockerfile
          push: ${{ github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
